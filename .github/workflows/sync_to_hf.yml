name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # 1. Explicitly set up Python so CLI tools link correctly
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      # 2. Install the CLI specifically
      - name: Install Hugging Face CLI
        run: pip install -U "huggingface_hub[cli]"
        
      # 3. Upload the current files directly
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: huggingface-cli upload ryuk001/MultiModal_JEE_AGent . . --repo-type space --token $HF_TOKEN
