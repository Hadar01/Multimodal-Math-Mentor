name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Hugging Face Hub
        # Using python -m pip ensures it attaches to the right Python version
        run: python -m pip install huggingface_hub
        
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # This runs a direct Python command to upload the folder, bypassing the CLI path issue entirely!
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_folder(
              folder_path='.',
              repo_id='ryuk001/MultiModal_JEE_AGent',
              repo_type='space',
              token=os.environ.get('HF_TOKEN'),
              ignore_patterns=['.git/*']
          )
          "
